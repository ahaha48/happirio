<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おみくじ占い ｜ Happirio</title>
  <meta name="description" content="毎日一度、心を込めてお引きください。Happirioが届ける今日のご縁と運勢。">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      background: #1a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      color: #f5e6c8;
    }

    .bg-petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .petal {
      position: absolute;
      top: -20px;
      font-size: 1.2rem;
      opacity: 0.15;
      animation: fall linear infinite;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .header {
      text-align: center;
    }
    .header h1 {
      font-size: 2.2rem;
      color: #e8c97a;
      letter-spacing: 0.3em;
      text-shadow: 0 0 20px rgba(232,201,122,0.5);
    }
    .header p {
      font-size: 0.85rem;
      color: #b8956a;
      letter-spacing: 0.1em;
      margin-top: 6px;
    }

    .shrine {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .tube-container {
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .tube-container:active { transform: scale(0.95); }

    .tube {
      width: 80px;
      height: 140px;
      background: linear-gradient(160deg, #8b1a1a 0%, #5c1010 40%, #3d0a0a 100%);
      border-radius: 8px 8px 14px 14px;
      position: relative;
      box-shadow:
        inset 2px 0 6px rgba(255,180,100,0.15),
        inset -2px 0 4px rgba(0,0,0,0.4),
        0 6px 20px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .tube::before {
      content: '御籤';
      writing-mode: vertical-rl;
      color: rgba(232,201,122,0.8);
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-shadow: 0 0 8px rgba(232,201,122,0.4);
    }
    .tube-top {
      width: 88px;
      height: 18px;
      background: linear-gradient(90deg, #6b1414, #9b2020, #6b1414);
      border-radius: 6px 6px 0 0;
      box-shadow: 0 -3px 8px rgba(0,0,0,0.4);
    }
    .tube-hole {
      width: 30px;
      height: 6px;
      background: #1a0505;
      border-radius: 3px;
      margin: 0 auto 2px;
      position: relative;
    }

    @keyframes shake {
      0%,100% { transform: rotate(0deg); }
      10% { transform: rotate(-8deg) translateX(-4px); }
      20% { transform: rotate(8deg) translateX(4px); }
      30% { transform: rotate(-6deg) translateX(-3px); }
      40% { transform: rotate(6deg) translateX(3px); }
      50% { transform: rotate(-4deg) translateX(-2px); }
      60% { transform: rotate(4deg) translateX(2px); }
      70% { transform: rotate(-2deg) translateX(-1px); }
      80% { transform: rotate(2deg) translateX(1px); }
    }
    .shaking {
      animation: shake 0.8s ease-in-out;
    }

    .draw-btn {
      background: linear-gradient(135deg, #c8922a, #e8c97a, #c8922a);
      color: #3d1a00;
      border: none;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-family: inherit;
      letter-spacing: 0.2em;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(200,146,42,0.4);
      transition: all 0.2s;
      font-weight: bold;
    }
    .draw-btn:hover {
      box-shadow: 0 6px 25px rgba(232,201,122,0.6);
      transform: translateY(-2px);
    }
    .draw-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(200,146,42,0.3);
    }
    .draw-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* おみくじ結果 */
    .result-card {
      width: 100%;
      background: linear-gradient(180deg, #fdf8ef 0%, #f5e9cc 100%);
      border-radius: 4px 4px 8px 8px;
      padding: 0;
      box-shadow:
        0 8px 30px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
      animation: unfold 0.6s ease-out;
      transform-origin: top center;
      display: none;
    }
    @keyframes unfold {
      from { transform: scaleY(0); opacity: 0; }
      to   { transform: scaleY(1); opacity: 1; }
    }
    .result-card.show { display: block; }

    .card-top-border {
      height: 12px;
      background: repeating-linear-gradient(
        90deg,
        #8b1a1a 0px, #8b1a1a 8px,
        #c8922a 8px, #c8922a 16px
      );
    }
    .card-bottom-border {
      height: 12px;
      background: repeating-linear-gradient(
        90deg,
        #c8922a 0px, #c8922a 8px,
        #8b1a1a 8px, #8b1a1a 16px
      );
    }

    .card-body {
      padding: 20px 24px 24px;
      color: #2a1a00;
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    }

    .card-title {
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: #8b1a1a;
      margin-bottom: 8px;
    }

    .fortune-rank {
      text-align: center;
      font-size: 3.5rem;
      font-weight: bold;
      line-height: 1;
      margin: 8px 0 4px;
      letter-spacing: 0.1em;
    }
    .fortune-rank.daikichi  { color: #c8130a; text-shadow: 0 2px 8px rgba(200,19,10,0.3); }
    .fortune-rank.chukichi  { color: #c87a0a; }
    .fortune-rank.shokichi  { color: #2a7a2a; }
    .fortune-rank.kichi     { color: #0a5a9b; }
    .fortune-rank.suekichi  { color: #6a3a9b; }
    .fortune-rank.kyo       { color: #555;    }
    .fortune-rank.daikyo    { color: #333;    }

    .fortune-sub {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
    }

    .divider {
      border: none;
      border-top: 1px solid #c8a87a;
      margin: 12px 0;
    }

    .poem {
      text-align: center;
      font-size: 0.9rem;
      line-height: 2;
      color: #4a3010;
      letter-spacing: 0.05em;
      padding: 8px 0;
      font-style: italic;
    }

    hr.divider { margin: 14px 0; }

    /* ラッキー情報 */
    .lucky-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }
    .lucky-card {
      background: rgba(139,26,26,0.06);
      border: 1px solid rgba(139,26,26,0.12);
      border-radius: 6px;
      padding: 10px 12px;
      text-align: center;
    }
    .lucky-card.wide {
      grid-column: 1 / -1;
      background: rgba(200,146,42,0.08);
      border-color: rgba(200,146,42,0.2);
    }
    .lucky-label {
      font-size: 0.6rem;
      color: #8b6a3a;
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }
    .lucky-value {
      font-size: 0.95rem;
      color: #3a2010;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .lucky-card.wide .lucky-value {
      font-size: 0.88rem;
      font-weight: normal;
      line-height: 1.5;
    }

    .fortune-details {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }
    .fortune-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .fortune-label {
      font-size: 0.7rem;
      color: #8b1a1a;
      letter-spacing: 0.15em;
      border: 1px solid #8b1a1a;
      border-radius: 3px;
      padding: 2px 6px;
      white-space: nowrap;
      min-width: 52px;
      text-align: center;
    }
    .fortune-text {
      font-size: 0.82rem;
      color: #3a2510;
      line-height: 1.6;
      flex: 1;
    }

    /* シェアセクション */
    .share-section {
      text-align: center;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #c8a87a;
    }
    .share-label {
      font-size: 0.7rem;
      color: #8b6a3a;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
    }
    .share-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .share-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: inherit;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      border: none;
    }
    .share-btn-x {
      background: #1a1a1a;
      color: #fff;
    }
    .share-btn-x:hover { background: #333; }
    .share-btn-line {
      background: #06C755;
      color: #fff;
    }
    .share-btn-line:hover { background: #05b04c; }

    /* CTA セクション */
    .cta-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #c8a87a;
    }
    .cta-label {
      font-size: 0.7rem;
      color: #8b6a3a;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      text-align: center;
    }
    .cta-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cta-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .cta-item:hover {
      transform: translateX(4px);
    }
    .cta-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.9rem;
    }
    .cta-body {
      flex: 1;
      min-width: 0;
    }
    .cta-title {
      font-size: 0.82rem;
      font-weight: bold;
      line-height: 1.3;
    }
    .cta-desc {
      font-size: 0.68rem;
      margin-top: 2px;
      opacity: 0.7;
    }
    .cta-item-kantei {
      background: rgba(139,26,26,0.06);
      border: 1px solid rgba(139,26,26,0.15);
    }
    .cta-item-kantei .cta-icon { background: rgba(139,26,26,0.15); color: #8b1a1a; }
    .cta-item-kantei .cta-title { color: #6b1414; }
    .cta-item-kantei .cta-desc  { color: #8b5a3a; }

    .cta-item-note {
      background: rgba(106,58,155,0.06);
      border: 1px solid rgba(106,58,155,0.15);
    }
    .cta-item-note .cta-icon { background: rgba(106,58,155,0.15); color: #6a3a9b; }
    .cta-item-note .cta-title { color: #5a2a8b; }
    .cta-item-note .cta-desc  { color: #7a5a9a; }

    .cta-item-booth {
      background: rgba(200,146,42,0.08);
      border: 1px solid rgba(200,146,42,0.2);
    }
    .cta-item-booth .cta-icon { background: rgba(200,146,42,0.15); color: #8b6a1a; }
    .cta-item-booth .cta-title { color: #6b4a0a; }
    .cta-item-booth .cta-desc  { color: #8b7a4a; }

    .retry-btn {
      width: 100%;
      background: transparent;
      color: #b8956a;
      border: 1px solid #b8956a;
      padding: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      letter-spacing: 0.2em;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
    }
    .retry-btn:hover {
      background: rgba(184,149,106,0.1);
      color: #e8c97a;
      border-color: #e8c97a;
    }

    .footer {
      font-size: 0.7rem;
      color: #5a3a2a;
      letter-spacing: 0.1em;
      text-align: center;
    }
    .footer a {
      color: #b8956a;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* ナビ */
    .nav-link {
      display: inline-block;
      font-size: 0.78rem;
      color: #b8956a;
      text-decoration: none;
      letter-spacing: 0.1em;
      padding: 6px 0;
      transition: color 0.2s;
    }
    .nav-link:hover { color: #e8c97a; }

    /* BGMコントロール */
    .bgm-ctrl {
      position: fixed; bottom: 16px; right: 16px; z-index: 100;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .bgm-toggle {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(42,10,10,0.9); border: 1px solid #8b1a1a;
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(4px);
    }
    .bgm-toggle:hover { border-color: #e8c97a; box-shadow: 0 0 12px rgba(232,201,122,0.3); }
    .bgm-volume-panel {
      background: rgba(42,10,10,0.92); border: 1px solid #8b1a1a;
      border-radius: 20px; padding: 8px 14px;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(6px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .bgm-volume-panel.panel-hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(6px) scale(0.95);
    }
    .vol-icon { font-size: 0.85rem; }
    .vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 90px; height: 3px;
      background: linear-gradient(to right, #c8922a var(--val,35%), #3a1010 var(--val,35%));
      border-radius: 2px; outline: none; cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #e8c97a;
      box-shadow: 0 0 6px rgba(232,201,122,0.5); cursor: pointer;
    }
    .vol-pct { font-size: 0.65rem; color: #b8956a; width: 26px; text-align: right; }
  </style>
</head>
<body>

<audio id="bgm" src="静穏みくじの庭.mp3" loop></audio>
<div class="bgm-ctrl">
  <div class="bgm-volume-panel panel-hidden" id="volPanel">
    <span class="vol-icon">🔉</span>
    <input class="vol-slider" id="volSlider" type="range" min="0" max="100" value="35"
      oninput="onVolChange(this)">
    <span class="vol-pct" id="volPct">35%</span>
  </div>
  <button class="bgm-toggle" id="bgmToggle" onclick="toggleBGM()">🎵</button>
</div>

<div class="bg-petals" id="bgPetals"></div>

<div class="container">
  <a href="../index.html" class="nav-link">← 占いトップへ</a>
  <div class="header">
    <h1>おみくじ</h1>
    <p>〜 今日のご縁を占います 〜</p>
  </div>

  <div class="shrine" id="shrine">
    <div class="tube-container" id="tubeContainer" onclick="drawOmikuji()">
      <div class="tube-top">
        <div class="tube-hole"></div>
      </div>
      <div class="tube"></div>
    </div>
    <button class="draw-btn" id="drawBtn" onclick="drawOmikuji()">おみくじを引く</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="card-top-border"></div>
    <div class="card-body">
      <div class="card-title">— 御 神 籤 —</div>
      <div class="fortune-rank" id="fortuneRank"></div>
      <div class="fortune-sub" id="fortuneSub"></div>

      <hr class="divider">
      <div class="poem" id="poem"></div>

      <hr class="divider">
      <div class="lucky-section" id="luckySection"></div>

      <hr class="divider">
      <div class="fortune-details" id="fortuneDetails"></div>

      <!-- シェアボタン -->
      <div class="share-section">
        <div class="share-label">今日の運勢をシェアする</div>
        <div class="share-buttons">
          <button class="share-btn share-btn-x" onclick="shareX()">𝕏 ポスト</button>
          <button class="share-btn share-btn-line" onclick="shareLINE()">LINE</button>
        </div>
      </div>

      <!-- 収益導線 -->
      <div class="cta-section">
        <div class="cta-label">〜 Happirio の開運アイテム 〜</div>
        <div class="cta-list">
          <a class="cta-item cta-item-booth" href="https://happirio.booth.pm/" target="_blank" rel="noopener">
            <div class="cta-icon">✦</div>
            <div class="cta-body">
              <div class="cta-title">開運待受画像を手に入れる</div>
              <div class="cta-desc">あなたのラッキーカラーの待受 ／ BOOTH ¥100〜</div>
            </div>
          </a>
          <a class="cta-item cta-item-note" href="https://note.com/happirio" target="_blank" rel="noopener">
            <div class="cta-icon">✎</div>
            <div class="cta-body">
              <div class="cta-title">今月の開運ガイドを読む</div>
              <div class="cta-desc">開運カラー解説＋待受画像セット ／ note ¥500〜</div>
            </div>
          </a>
        </div>
      </div>

      <button class="retry-btn" onclick="reset()">もう一度引く</button>
    </div>
    <div class="card-bottom-border"></div>
  </div>

  <div class="footer">
    毎日一度、心を込めてお引きください<br>
    <span style="margin-top:4px;display:inline-block">
      <a href="https://x.com/Happirio_" target="_blank">Happirio</a>
    </span>
  </div>
</div>

<script>
  // 花びら生成
  const petals = document.getElementById('bgPetals');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = ['\u{1F338}','\u273F','\u2740','\u{1F33A}'][Math.floor(Math.random()*4)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    petals.appendChild(p);
  }

  // ラッキー情報のプール
  const luckyItems = [
    'ミントティー','赤い傘','手書きの手紙','木のスプーン','小さな花束',
    'レモンキャンディ','お気に入りの本','白いハンカチ','銀色のペン','焼きたてパン',
    '柑橘系の香水','革のブックカバー','手作りクッキー','古い写真','青い石',
    'シナモンの香り','窓辺の植物','オルゴール','和紙のメモ帳','桜の箸置き',
  ];
  const luckyColors = [
    '桜色','若葉色','藍色','珊瑚色','山吹色',
    '藤色','翡翠色','茜色','月白','鴇色',
    '萌黄','群青','紅梅色','浅葱色','胡桃色',
  ];
  const luckyActions = [
    '窓を開けて深呼吸してみよう',
    '普段通らない道を歩いてみよう',
    '久しぶりの人にメッセージを送ろう',
    '今日は少しだけ早起きしてみよう',
    'お気に入りの音楽を聴きながら散歩しよう',
    '手書きで日記を書いてみよう',
    '空を見上げて雲の形を探してみよう',
    '好きな飲み物をゆっくり味わおう',
    '部屋の小さな模様替えをしてみよう',
    '今日の夕焼けを写真に撮ってみよう',
    '感謝の気持ちを言葉にして伝えよう',
    '新しいレシピに挑戦してみよう',
    '一駅分だけ歩いてみよう',
    'お花を一輪買って帰ろう',
    '寝る前にストレッチをしてみよう',
  ];

  // 日付シードで当日固定のランダム選択
  function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }
  function getTodaySeed() {
    const d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  }
  function pickFromArray(arr, offset) {
    const seed = getTodaySeed() + offset;
    const idx = Math.floor(seededRandom(seed) * arr.length);
    return arr[idx];
  }

  const fortunes = [
    {
      rank: '大吉', sub: 'だいきち', cls: 'daikichi',

  const weights = [15, 20, 20, 20, 15, 7, 3];

  function weightedRandom() {
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < weights.length; i++) {
      r -= weights[i];
      if (r <= 0) return i;
    }
    return 0;
  }

  // ---- Web Audio SE ----
  let audioCtx = null;
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playShakeSound() {
    const ctx = getCtx();
    const count = 18;
    for (let i = 0; i < count; i++) {
      const t = ctx.currentTime + i * 0.048;
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1) * 0.6;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const bpf = ctx.createBiquadFilter();
      bpf.type = 'bandpass';
      bpf.frequency.value = 2800 + Math.random() * 800;
      bpf.Q.value = 1.2;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.28, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.038);
      src.connect(bpf).connect(gain).connect(ctx.destination);
      src.start(t);
      src.stop(t + 0.04);
    }
  }

  function playUnfoldSound() {
    const ctx = getCtx();
    const dur = 0.45;
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bpf = ctx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.setValueAtTime(800, ctx.currentTime);
    bpf.frequency.linearRampToValueAtTime(3200, ctx.currentTime + 0.2);
    bpf.frequency.linearRampToValueAtTime(600, ctx.currentTime + dur);
    bpf.Q.value = 0.8;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.05);
    gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    src.connect(bpf).connect(gain).connect(ctx.destination);
    src.start(ctx.currentTime);
    src.stop(ctx.currentTime + dur);
  }

  function playBellSound(freq = 880, delay = 0) {
    const ctx = getCtx();
    const t = ctx.currentTime + delay;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.92, t + 1.2);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
    const osc2 = ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2.76, t);
    const gain2 = ctx.createGain();
    gain2.gain.setValueAtTime(0.0, t);
    gain2.gain.linearRampToValueAtTime(0.08, t + 0.01);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.connect(gain).connect(ctx.destination);
    osc2.connect(gain2).connect(ctx.destination);
    osc.start(t); osc.stop(t + 1.9);
    osc2.start(t); osc2.stop(t + 0.7);
  }

  function playFanfare() {
    const ctx = getCtx();
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const t = ctx.currentTime + i * 0.12;
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.6);
    });
  }

  function playDarkSound() {
    const ctx = getCtx();
    const t = ctx.currentTime;
    [110, 130.81].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0, t + i * 0.1);
      gain.gain.linearRampToValueAtTime(0.15, t + i * 0.1 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 1.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 1.3);
    });
  }

  function getTodayString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function checkAlreadyDrawn() {
    try {
      const data = localStorage.getItem('omikuji_data');
      if (!data) return false;
      return JSON.parse(data).date === getTodayString();
    } catch (e) { return false; }
  }

  function getStoredFortuneIndex() {
    try {
      const data = localStorage.getItem('omikuji_data');
      if (!data) return null;
      return JSON.parse(data).fortuneIndex;
    } catch (e) { return null; }
  }

  // 現在の結果（シェア用に保持）
  let currentFortune = null;
  let currentLucky = null;

  function drawOmikuji() {
    if (checkAlreadyDrawn()) return;
    const btn = document.getElementById('drawBtn');
    const tube = document.getElementById('tubeContainer');
    if (btn.disabled) return;
    btn.disabled = true;

    playShakeSound();

    tube.classList.add('shaking');
    setTimeout(() => {
      tube.classList.remove('shaking');
      showResult(true);
    }, 900);
  }

  function showResult(isNew) {
    let fortuneIndex;
    if (isNew) {
      fortuneIndex = weightedRandom();
      localStorage.setItem('omikuji_data', JSON.stringify({ date: getTodayString(), fortuneIndex }));
    } else {
      fortuneIndex = getStoredFortuneIndex();
    }
    const fortune = fortunes[fortuneIndex];
    currentFortune = fortune;

    // 日付シードでラッキー情報を固定
    currentLucky = {
      item: pickFromArray(luckyItems, 1),
      color: pickFromArray(luckyColors, 2),
      action: pickFromArray(luckyActions, 3),
    };

    // SE
    if (isNew) {
      playUnfoldSound();
      playBellSound(880, 0.15);
      if (fortune.cls === 'daikichi') {
        setTimeout(playFanfare, 350);
      } else if (fortune.cls === 'daikyo') {
        setTimeout(playDarkSound, 350);
      } else {
        playBellSound(660, 0.45);
      }
    }

    document.getElementById('fortuneRank').textContent = fortune.rank;
    document.getElementById('fortuneRank').className = 'fortune-rank ' + fortune.cls;
    document.getElementById('fortuneSub').textContent = fortune.sub;
    document.getElementById('poem').textContent = fortune.poem;

    // ラッキー情報
    const luckyEl = document.getElementById('luckySection');
    luckyEl.innerHTML = `
      <div class="lucky-card">
        <div class="lucky-label">LUCKY ITEM</div>
        <div class="lucky-value">${currentLucky.item}</div>
      </div>
      <div class="lucky-card">
        <div class="lucky-label">LUCKY COLOR</div>
        <div class="lucky-value">${currentLucky.color}</div>
      </div>
      <div class="lucky-card wide">
        <div class="lucky-label">TODAY'S ACTION</div>
        <div class="lucky-value">${currentLucky.action}</div>
      </div>
    `;

    // 詳細
    const detailsEl = document.getElementById('fortuneDetails');
    detailsEl.innerHTML = '';
    fortune.details.forEach(d => {
      const item = document.createElement('div');
      item.className = 'fortune-item';
      item.innerHTML = `<span class="fortune-label">${d.label}</span><span class="fortune-text">${d.text}</span>`;
      detailsEl.appendChild(item);
    });

    const card = document.getElementById('resultCard');
    card.classList.add('show');
    card.style.animation = 'none';
    requestAnimationFrame(() => {
      card.style.animation = '';
      card.classList.add('show');
    });

    if (isNew) {
      setTimeout(() => {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    document.getElementById('shrine').style.opacity = '0.4';

    const retryBtn = document.querySelector('.retry-btn');
    retryBtn.textContent = 'また明日お越しください';
    retryBtn.disabled = true;
    retryBtn.style.opacity = '0.5';
    retryBtn.style.cursor = 'default';
  }

  function reset() {
    if (checkAlreadyDrawn()) return;
    const card = document.getElementById('resultCard');
    card.classList.remove('show');
    document.getElementById('drawBtn').disabled = false;
    document.getElementById('shrine').style.opacity = '1';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // SNSシェア
  function shareX() {
    if (!currentFortune || !currentLucky) return;
    const text = `今日のおみくじは【${currentFortune.rank}】\nLucky item: ${currentLucky.item}\nLucky color: ${currentLucky.color}\n\n${currentLucky.action}\n\n#おみくじ #今日の運勢 #Happirio`;
    const url = encodeURIComponent(window.location.href);
    window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${url}`, '_blank');
  }

  function shareLINE() {
    if (!currentFortune || !currentLucky) return;
    const text = `今日のおみくじは【${currentFortune.rank}】\nLucky item: ${currentLucky.item}\nLucky color: ${currentLucky.color}\n${currentLucky.action}`;
    window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(text)}`, '_blank');
  }

  // BGM
  let bgmStarted = false;
  let bgmMuted = false;
  let volPanelOpen = false;
  const bgmEl = document.getElementById('bgm');
  bgmEl.volume = 0.35;
  function startBGM() {
    if (bgmStarted) return;
    bgmStarted = true;
    bgmEl.play().catch(() => {});
  }
  document.addEventListener('click',      () => startBGM(), { once: true });
  document.addEventListener('touchstart', () => startBGM(), { once: true });
  function toggleBGM() {
    if (!bgmStarted) startBGM();
    volPanelOpen = !volPanelOpen;
    const panel = document.getElementById('volPanel');
    if (volPanelOpen) {
      panel.classList.remove('panel-hidden');
    } else {
      panel.classList.add('panel-hidden');
      bgmMuted = !bgmMuted;
      bgmEl.muted = bgmMuted;
      document.getElementById('bgmToggle').textContent = bgmMuted ? '🔇' : '🎵';
    }
  }
  function onVolChange(slider) {
    const val = parseInt(slider.value);
    bgmEl.volume = val / 100;
    bgmEl.muted = false;
    bgmMuted = false;
    document.getElementById('bgmToggle').textContent = val === 0 ? '🔇' : '🎵';
    document.getElementById('volPct').textContent = val + '%';
    slider.style.setProperty('--val', val + '%');
  }

  // ページ読み込み時：本日すでに引いていれば結果を復元
  document.addEventListener('DOMContentLoaded', () => {
    if (checkAlreadyDrawn()) {
      document.getElementById('drawBtn').disabled = true;
      showResult(false);
    }
  });
</script>
